 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Furry Friend</title>
    <style>
        body {
        font-family: cursive;
        background-color: rgb(255, 184, 255);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 999px;
    }
        .signup-container {
        background-color: rgb(248, 147, 252);
        width: 500px;
        height: 550;
        padding: 25px;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        animation: dropdown 5s;
        transform: translateY(30px);
        
    
    }
    @keyframes dropdown{
        from {
            opacity: 0;
        }
        to { opacity: 1; transform: translateY(0px); }
    }
    input{
        width: 50%;
        padding: 8px;
        margin: 8px ;
        border-radius: 10px;
        border: 1px ;
    }
    select{
        width: 50%;
        padding: 8px;
        margin: 8px ;
        border-radius: 10px;
        border: 1px ;
    }
    .btn5 {
        padding: 10px;
        margin-top: 10px;
        border-radius: 10px;
        background-color: rgb(246, 205, 246);
        transition: background-color 0.3s, transform 0.3s;
    }
    .btn5:hover {
        background-color: rgb(228, 122, 228);
        transform: scale(1.05);
    }
    </style>
 </head>
 <body>
    <div class="signup-container">
        <h1>Sign Up for Your Furry Friend! 🐾</h1>
        <form>
            <label>Username:</label><br>
            <input type="text" placeholder="Enter your username 👤"><br>
            <label>Email:</label><br>
            <input type="email" placeholder="Enter your email "><br>
            <label>Phone Number:</label><br>
            <input type="tel" placeholder="Enter your phone number 📞"><br>
            <label>Password:</label><br>
            <input type="password" placeholder="Enter your password">
            <br>
            <label>Confirm Password:</label><br>
            <input type="password" placeholder="Confirm your password">
            <br>
            <select>
                <option value="" disabled selected>Select your favorite pet 🐾</option>
                <option>Dog 🐕</option>
                <option>Cat 🐈</option>
                <option>Bird 🐣</option>
            </select>
            <br>
            <button class="btn5"><a href="home.html">Sign Up</a></button>
         <br>
         <P>Already have an account? <a href="login.html">Login here</a></P>
        </form>
    </div>
 </body>
 </html>
