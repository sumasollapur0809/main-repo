 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Furry Friend</title>
   
 </head>
 <body>
    <div class="signup-container">
        <h1>Sign Up for Your Furry Friend! 🐾</h1>
        <form>
            <label>Username:</label><br>
            <input type="text" placeholder="Enter your username 👤"><br>
            <label>Email:</label><br>
            <input type="email" placeholder="Enter your email "><br>
            <label>Phone Number:</label><br>
            <input type="tel" placeholder="Enter your phone number 📞"><br>
            <label>Password:</label><br>
            <input type="password" placeholder="Enter your password">
            <br>
            <label>Confirm Password:</label><br>
            <input type="password" placeholder="Confirm your password">
            <br>
            <select>
                <option value="" disabled selected>Select your favorite pet 🐾</option>
                <option>Dog 🐕</option>
                <option>Cat 🐈</option>
                <option>Bird 🐣</option>
            </select>
            <br>
            <button class="btn5"><a href="home.html">Sign Up</a></button>
         <br>
         <P>Already have an account? <a href="login.html">Login here</a></P>
        </form>
    </div>
 </body>
 </html>
