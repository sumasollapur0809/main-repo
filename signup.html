<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Furry Friend</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-header">
    <img src="pet-adoption-center.png" alt="Furry Friend Logo" class="auth-logo"><h1>Your Furry Friend</h1>
  </div>

  <div class="signup-container">

    <h1>Sign Up for Your Furry Friend! 🐾</h1>
    <form>
      <label>Username:</label>
      <input type="text" placeholder="Enter your username 👤">

      <label>Email:</label>
      <input type="email" placeholder="Enter your email">

      <label>Phone Number:</label>
      <input type="tel" placeholder="Enter your phone number 📞">

      <label>Password:</label>
      <input type="password" placeholder="Enter your password">

      <label>Confirm Password:</label>
      <input type="password" placeholder="Confirm your password">

      <select>
        <option value="" disabled selected>Select your favorite pet 🐾</option>
        <option>Dog 🐕</option>
        <option>Cat 🐈</option>
        <option>Bird 🐣</option>
      </select>

      <button class="btn5" type="submit">Sign Up</button>
    </form>

    <p>Already have an account? <a href="login.html">Login here</a></p>
  </div>

</body>
</html>
