<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Furry Friend</title>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="checkLogin()">
    <div class="auth-header">
    <img src="pet-adoption-center.png" alt="Furry Friend Logo" class="auth-logo">
  </div>
  <div class="adopt-center">
    <div class="adopt-container">
      <h1>Adopt a Pet 😊</h1>
      <p>Fill the form to adopt your furry friend ❤️</p>

      <form>
        <label class="f">Adoption Form</label><br><br>

        <label>Your Name:</label><br>
        <input type="text" id="name" name="name" placeholder="enter your name" required><br>

        <label>Email Address:</label><br>
        <input type="email" id="email" name="email" placeholder="enter your email" required><br>

        <label>Contact no.:</label><br>
        <input type="text" id="cont" name="contact no." placeholder="enter your mobile no." required><br>

        <label>Select a Pet:</label><br>
        <select id="pet" required>
          <option value="">--Please choose an option--</option>
          <option value="dog">Dog 🐶</option>
          <option value="cat">Cat 😺</option>
          <option value="rabbit">Rabbit 🐰</option>
          <option value="hamster">Hamster 🐹</option>
        </select><br>

        <label>Preferred Adoption Date:</label><br>
        <input type="date" id="adoption-date" name="adoption-date" required><br>

        <label>Address:</label><br>
        <input type="text" id="address" name="address" placeholder="enter your address 🏠" required><br>

        <label>Additional Comments:</label><br>
        <textarea id="comments" name="comments" rows="4" cols="50" placeholder="Any specific requirements or questions? 😊"></textarea><br>

        <button class="adopt-btn" type="submit">Submit</button>
      </form>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
