<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Furry Friend</title>
    
</head>
<body>
    <h1>Adopt a Pet 😊</h1>
    <p>Thank you for choosing to adopt a pet! Please fill out the form below to start the adoption process❤️😺.</p>
    <form fieldset>
        <label class="f">Adoption Form</label><br><br>
        <label>Your Name:</label><br>
        <input type="text" id="name" name="name" placeholder="enter your name" required><br><br>

        <label >Email Address:</label><br>
        <input type="email" id="email" name="email" placeholder="enter your email" required><br><br>

        <label>Contact no.:</label><br>
        <input type="text" id="cont" name="contact no." placeholder="enter your mobile no." required> <br><br>

        <label>Select a Pet:</label><br>
        <select id="pet" required>
            <option value="">--Please choose an option--</option>
            <option value="dog">Dog🐶</option>
            <option value="cat">Cat😺</option>
            <option value="rabbit">Rabbit🐰</option>
            <option value="hamster">Hamster🐹</option>
        </select><br><br>
        
        <label>Preferred Adoption Date:</label><br>
        <input type="date" id="adoption-date" name="adoption-date" required><br><br>

        <label>Address:</label><br>
        <input type="text" id="address" name="address" placeholder="enter your address 🏠" required><br>

        <label>Additional Comments:</label><br>
        <textarea id="comments" name="comments" rows="4" cols="50" placeholder="Any specific requirements or questions?😊"></textarea><br><br>    

        <button class="btn" type="submit">Submit</button>
    </form>
</body>
</html>
