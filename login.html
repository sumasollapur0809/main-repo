<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Furry Friend</title>

<style>
    body {
        font-family: cursive;
        background-color: rgb(255, 184, 255);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 999px;
    }

    .login{
        background-color: rgb(248, 147, 252);
        width: 320px;
        padding: 25px;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        animation: dropdown 5s;
        transform: translateY(30px);
    
    }
    @keyframes dropdown{
    from {
            opacity: 0;
        }
        to { opacity: 1; transform: translateY(0px); }
    }

    

    h1 {
        margin-bottom: 20px;
    }

    input {
        width: 90%;
        padding: 8px;
        margin: 8px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    .btn {
        padding: 10px;
        margin-top: 10px;
        border-radius: 10px;
        background-color: rgb(246, 205, 246);
        transition: background-color 0.3s, transform 0.3s;
    }

    .btn:hover {
        background-color: rgb(230, 170, 230);
        transform: scale(1);
    }

    p {
        margin-top: 15px;
    }


</style>
</head>

<body>

<div class="login">
    <h1>Login to your furry friend account 😀</h1>

    <form>
        <label>Username:</label><br>
        <input type="text" placeholder="Enter your username"><br>

        <label>Password:</label><br>
        <input type="password" placeholder="Enter your password ⌨️"><br>
    </form>
<br>
    <a class="btn" href="home.html">Login</a>
    

    <p>Don't have an account? No problem 😊</p>
    <br>
        <a  class="btn"href="signup.html">Sign Up</a>
  
</div>

</body>
</html>
